apiVersion: apps/v1
kind: Deployment
metadata:
  name: sistema-inventario-deploy
  labels:
    app: sistema-inventario
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sistema-inventario
  template:
    metadata:
      labels:
        app: sistema-inventario
    spec:
      containers:
      - name: sistema-inventario
        image: tu-usuario/sistema-inventario:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url